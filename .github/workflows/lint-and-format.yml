name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint

      - name: Run Prettier check
        id: prettier
        run: npm run format:check

      - name: Provide fixing suggestions on failure
        if: failure()
        run: |
          echo "::error::Linting or formatting checks failed! Please run the following commands locally to fix these issues before pushing:"
          echo "::error::  npm run lint:fix"
          echo "::error::  npm run format"
          exit 1
